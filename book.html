<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/book.css" rel="stylesheet">
    <script src="js/common.js" defer></script>
    <script src="js/book.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap" rel="stylesheet">
    <title class="book-page-title"></title>
</head>
<body>
    <header class="site-header">
        <div class="nav-container"> 
            <nav class="main-nav">
                <a href="index.html" class="logo-link">
                    <img src="img/logo.png" alt="Главная" class="logo">
                </a>
                <a href="catalogue.html">Каталог</a>
                <a href="map.html">Карта</a>
                <a href="about.html">События</a>
            </nav>
        </div>
    </header>

    <div class="page-content">

        <div class="search-half">
            <form>
                <div class="search-wrapper">
                    <input class="main-search" type="text" placeholder="Найти книгу...">
                    <div class="search-dropdown" id="search-dropdown" style="display: none;"></div>
                    <button type="submit" class="search-button"></button>
                </div>
            </form>
        </div>
    </div>

    <div class="book-container-content">
        <div id="book-container"></div>
    </div>

    <div class="nav-container">
        <footer>2026. Все права защищены</footer>
    </div>

    <template id="book-template">
        <div class="book-page">
            <div class="book-page-cover">
                <img src="" alt="">
            </div>
            <div class="book-page-info">
                <h1 class="book-page-title"></h1>
                <p class="book-page-author"></p>
                <div class="book-page-rating">
                    <div class="stars-container"></div>
                    <span class="rating-value"></span>
                </div>
                <div class="book-page-genres"></div>
                <div class="book-page-stock-status"></div>
                <button class="book-page-button"></button>
                <div class="book-page-note">! Бронирование книги активно в течение трех дней. 
                    Если вы не заберете книгу вовремя, бронь будет считаться недествительной.</div>
            </div>
        </div>
    </template>
</body>
</html>
