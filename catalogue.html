<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/catalogue.css" rel="stylesheet">
    <script src="js/common.js" defer></script>
    <script src="js/catalogue.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap" rel="stylesheet">
    <title>Библиотека - каталог</title>
</head>

<body>
    <header class="site-header">
        <div class="nav-container"> 
            <nav class="main-nav">
                <a href="index.html" class="logo-link">
                    <img src="img/logo.png" alt="Главная" class="logo">
                </a>
                <a href="catalogue.html">Каталог</a>
                <a href="map.html">Карта</a>
                <a href="about.html">События</a>
            </nav>
        </div>
    </header>

    <div class="page-content">
        <div class="catalogue-controls">
            <div class="catalogue-filters">
                <div class="filter-group">
                    <div class="multi-select-dropdown">
                        <div class="dropdown-trigger">
                            <div class="selected-items">
                                <span class="placeholder">Выберите жанры...</span>
                            </div>
                            <span class="dropdown-arrow">⌵</span>
                        </div>
                        <div class="dropdown-content">
                            <div class="genre-options">

                            </div>
                        </div>
                    </div>
                </div>

                <label class="filter-checkbox">
                    <input type="checkbox" class="in-stock-checkbox">В наличии
                </label>
            </div>

            <div class="search-half">
                <form>
                    <div class="search-wrapper">
                        <input class="main-search" type="text" placeholder="Найти книгу...">
                        <div class="search-dropdown" id="search-dropdown" style="display: none;"></div>
                        <button type="submit" class="search-button"></button>
                    </div>
                </form>
            </div>
        </div>

        <div class="catalogue-section">
            <div class="catalogue-grid" id="books-container"></div>
            <div class="load-more-wrapper" id="load-more-wrapper" style="display: none;">
                <button class="load-more-btn" id="load-more-btn">Показать еще</button>
            </div>
        </div>

        <div class="load-more-wrapper" id="load-more-wrapper" style="display: none;">
            <button class="load-more-btn" id="load-more-btn">Показать еще</button>
        </div>
        <footer>2026. Все права защищены</footer>
    </div>   
    
    

    <template id="book-template">
        <div class="book-card" data-book-id="" data-in-stock="true">
            <div class="book-cover">
                <img src="" alt="">
                <div class="book-rating">
                    <span class="rating-value"></span>
                    <span class="star-icon">★</span> 
                </div>
            </div>
            <div class="book-info">
                <p class="book-title"></p>
                <p class="book-author"></p>
            </div>
            <button class="book-button"></button>
        </div>
    </template>
</body>
</html>
